<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting To Hollow Developer Login</title>
    <meta name="robots" content="noindex, nofollow" />
    <script>
        (() => {
            const target = `/developer/login/${window.location.search}${window.location.hash}`;
            window.location.replace(target);
        })();
    </script>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: sans-serif;
            background: #f8fafc;
            color: #111827;
        }

        a {
            color: #1976ff;
        }
    </style>
</head>

<body>
    <p>Redirecting to the developer login. If nothing happens, <a href="/developer/login/">continue here</a>.</p>
</body>

</html>
